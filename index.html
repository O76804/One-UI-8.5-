<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung UI Mockup</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; text-align: center; background: #1a1a1a; }
        #content-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-screen { background: #fff; color: #000; width: 300px; height: 500px; border-radius: 30px; overflow: hidden; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .active { display: flex; }
        nav { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px 0; }
        .nav-item { cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .nav-item:hover { opacity: 1; }
        .dialer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .key { background: #f0f0f0; padding: 20px; border-radius: 50%; text-align: center; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h2 id="app-title">Home</h2>
    </header>

    <div id="content-area">
        <div id="dialer" class="app-screen">
            <div style="padding: 40px 20px; font-size: 2rem; text-align: center;" id="phone-display">_</div>
            <div class="dialer-grid" id="dialer-keys"></div>
        </div>

        <div id="messages" class="app-screen">
            <div style="padding: 20px;" id="message-list"></div>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="showApp('dialer')">📞 Dialer</div>
        <div class="nav-item" onclick="showApp('messages')">💬 Messages</div>
    </nav>

    <script type="module" src="data.js"></script>
</body>
</html>
